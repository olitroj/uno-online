<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background so the cat is visible on any browser tab -->
  <rect width="32" height="32" rx="7" fill="#1a1040"/>
  <!-- Left ear -->
  <polygon points="4,12 7,2 12,11" fill="#a89eff"/>
  <polygon points="5.5,11 7,4 10.5,11" fill="#ff9eb5"/>
  <!-- Right ear -->
  <polygon points="20,11 25,2 28,12" fill="#a89eff"/>
  <polygon points="21.5,11 25,4 26.5,11" fill="#ff9eb5"/>
  <!-- Cat face -->
  <ellipse cx="16" cy="19" rx="12" ry="11" fill="#a89eff"/>
  <!-- Eyes (vertical-slit pupils) -->
  <ellipse cx="12" cy="18" rx="2.2" ry="2.8" fill="#1a1040"/>
  <ellipse cx="20" cy="18" rx="2.2" ry="2.8" fill="#1a1040"/>
  <circle cx="12.9" cy="16.8" r="0.7" fill="white"/>
  <circle cx="20.9" cy="16.8" r="0.7" fill="white"/>
  <!-- Nose -->
  <ellipse cx="16" cy="22" rx="1.5" ry="1" fill="#ff9eb5"/>
  <!-- Mouth -->
  <path d="M14.5 23 Q16 24.5 17.5 23" stroke="#1a1040" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="3" y1="21" x2="13" y2="22" stroke="#6c5ce7" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="3" y1="23" x2="13" y2="23" stroke="#6c5ce7" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="19" y1="22" x2="29" y2="21" stroke="#6c5ce7" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="19" y1="23" x2="29" y2="23" stroke="#6c5ce7" stroke-width="0.8" stroke-linecap="round"/>
</svg>
